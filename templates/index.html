<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>SRT 转语音工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">SRT 语音合成</h1>
        <form action="/convert" method="post" enctype="multipart/form-data" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">选择 SRT 文件</label>
                <input type="file" name="file" class="mt-1 block w-full p-2 border border-gray-300 rounded-md">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">选择音色 (Edge-TTS)</label>
                <select name="voice" class="mt-1 block w-full p-2 border border-gray-300 rounded-md">
                    <option value="zh-CN-XiaoxiaoNeural">晓晓 (女声 - 推荐)</option>
                    <option value="zh-CN-YunxiNeural">云希 (男声)</option>
                    <option value="zh-CN-YunjianNeural">云健 (男声)</option>
                    <option value="en-US-AnaNeural">Ana (美式女声)</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition">开始转换</button>
        </form>
    </div>
</body>
</html>
