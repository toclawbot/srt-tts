<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRT 语音合成</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">SRT 语音合成</h1>
        <form action="/convert" method="post" enctype="multipart/form-data" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">上传 SRT 文件</label>
                <input type="file" name="file" required class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">选择音色</label>
                <select name="voice" class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                    <option value="zh-CN-XiaoxiaoNeural">晓晓 (女声 - 推荐)</option>
                    <option value="zh-CN-YunxiNeural">云希 (男声)</option>
                    <option value="zh-CN-YunjianNeural">云健 (男声)</option>
                    <option value="zh-CN-XiaoyiNeural">晓伊 (女声)</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">语速: <span id="rateValue">1.0x</span></label>
                <input type="range" name="rate" min="0.5" max="2.0" step="0.1" value="1.0" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition duration-200">开始转换</button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-200">
            <h2 class="text-lg font-semibold text-gray-700 mb-4">在线试听</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">试听文本 (最多50字)</label>
                    <textarea id="previewText" maxlength="50" rows="2" class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 resize-none" placeholder="输入要试听的文本..."></textarea>
                    <p class="text-xs text-gray-400 mt-1"><span id="charCount">0</span>/50</p>
                </div>
                <button id="previewBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 rounded-lg transition duration-200">试听</button>
                <audio id="audioPlayer" controls class="w-full hidden"></audio>
            </div>
        </div>
    </div>
    <script>
        document.querySelector('input[name="rate"]').addEventListener('input', function() {
            document.getElementById('rateValue').textContent = this.value + 'x';
        });

        document.getElementById('previewText').addEventListener('input', function() {
            document.getElementById('charCount').textContent = this.value.length;
        });

        document.getElementById('previewBtn').addEventListener('click', async function() {
            const text = document.getElementById('previewText').value.trim();
            const voice = document.querySelector('select[name="voice"]').value;
            const rate = document.querySelector('input[name="rate"]').value;

            if (!text) {
                alert('请输入试听文本');
                return;
            }

            this.disabled = true;
            this.textContent = '生成中...';

            try {
                const response = await fetch('/preview', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text, voice, rate }),
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    const audioPlayer = document.getElementById('audioPlayer');
                    audioPlayer.src = url;
                    audioPlayer.classList.remove('hidden');
                    audioPlayer.play();
                } else {
                    const error = await response.json();
                    alert('生成失败: ' + error.error);
                }
            } catch (error) {
                alert('请求失败: ' + error.message);
            } finally {
                this.disabled = false;
                this.textContent = '试听';
            }
        });
    </script>
</body>
</html>
