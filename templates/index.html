<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRT 语音合成</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">SRT 语音合成</h1>
        <form id="convertForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">上传 SRT 文件</label>
                <input type="file" name="file" required class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">选择音色</label>
                <select name="voice" class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                    <option value="zh-CN-XiaoxiaoNeural">晓晓 (女声 - 推荐)</option>
                    <option value="zh-CN-YunxiNeural">云希 (男声)</option>
                    <option value="zh-CN-YunjianNeural">云健 (男声)</option>
                    <option value="zh-CN-XiaoyiNeural">晓伊 (女声)</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">语速: <span id="rateValue">1.0x</span></label>
                <input type="range" name="rate" min="0.5" max="2.0" step="0.1" value="1.0" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
            </div>
            <button type="submit" id="convertBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition duration-200">开始转换</button>
        </form>

        <!-- 进度条区域 -->
        <div id="progressArea" class="mt-6 hidden">
            <div class="flex justify-between text-sm text-gray-600 mb-2">
                <span id="progressText">正在转换...</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-3">
                <div id="progressBar" class="bg-blue-600 h-3 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <p id="progressDetail" class="text-xs text-gray-400 mt-1">0 / 0</p>
        </div>

        <!-- 下载区域 -->
        <div id="downloadArea" class="mt-6 hidden">
            <div class="bg-green-50 border border-green-200 rounded-lg p-4">
                <p class="text-green-800 font-medium mb-3">✅ 转换完成！</p>
                <a id="downloadBtn" href="#" class="block w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 rounded-lg transition duration-200 text-center">下载音频</a>
            </div>
        </div>

        <!-- 错误区域 -->
        <div id="errorArea" class="mt-6 hidden">
            <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                <p class="text-red-800 font-medium">❌ 转换失败</p>
                <p id="errorMessage" class="text-red-600 text-sm mt-1"></p>
            </div>
        </div>

        <div class="mt-8 pt-6 border-t border-gray-200">
            <h2 class="text-lg font-semibold text-gray-700 mb-4">在线试听</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">试听文本 (最多50字)</label>
                    <textarea id="previewText" maxlength="50" rows="2" class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 resize-none" placeholder="输入要试听的文本..."></textarea>
                    <p class="text-xs text-gray-400 mt-1"><span id="charCount">0</span>/50</p>
                </div>
                <button id="previewBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 rounded-lg transition duration-200">试听</button>
                <audio id="audioPlayer" controls class="w-full hidden"></audio>
            </div>
        </div>
    </div>
    <script>
        document.querySelector('input[name="rate"]').addEventListener('input', function() {
            document.getElementById('rateValue').textContent = this.value + 'x';
        });

        document.getElementById('previewText').addEventListener('input', function() {
            document.getElementById('charCount').textContent = this.value.length;
        });

        document.getElementById('previewBtn').addEventListener('click', async function() {
            const text = document.getElementById('previewText').value.trim();
            const voice = document.querySelector('select[name="voice"]').value;
            const rate = document.querySelector('input[name="rate"]').value;

            if (!text) {
                alert('请输入试听文本');
                return;
            }

            this.disabled = true;
            this.textContent = '生成中...';

            try {
                const response = await fetch('/preview', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text, voice, rate }),
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    const audioPlayer = document.getElementById('audioPlayer');
                    audioPlayer.src = url;
                    audioPlayer.classList.remove('hidden');
                    audioPlayer.play();
                } else {
                    // 尝试解析错误信息
                    try {
                        const errorData = await response.json();
                        alert('生成失败: ' + errorData.error);
                    } catch (jsonError) {
                        // 如果不是JSON，显示状态信息
                        alert('生成失败: HTTP ' + response.status);
                    }
                }
            } catch (error) {
                alert('请求失败: ' + error.message);
            } finally {
                this.disabled = false;
                this.textContent = '试听';
            }
        });

        // 转换表单提交
        document.getElementById('convertForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = new FormData(this);
            const convertBtn = document.getElementById('convertBtn');
            const progressArea = document.getElementById('progressArea');
            const downloadArea = document.getElementById('downloadArea');
            const errorArea = document.getElementById('errorArea');

            // 重置UI
            progressArea.classList.add('hidden');
            downloadArea.classList.add('hidden');
            errorArea.classList.add('hidden');
            convertBtn.disabled = true;
            convertBtn.textContent = '正在转换...';

            try {
                const response = await fetch('/convert', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || '转换失败');
                }

                const result = await response.json();
                const taskId = result.task_id;

                // 显示进度条
                progressArea.classList.remove('hidden');

                // 轮询进度
                pollProgress(taskId);

            } catch (error) {
                errorArea.classList.remove('hidden');
                document.getElementById('errorMessage').textContent = error.message;
                convertBtn.disabled = false;
                convertBtn.textContent = '开始转换';
            }
        });

        // 修复JSON解析错误的函数
        async function safeJsonParse(response) {
            try {
                const text = await response.text();
                if (!text.trim()) {
                    throw new Error('响应为空');
                }
                return JSON.parse(text);
            } catch (parseError) {
                console.error('JSON解析错误:', parseError, '原始响应:', text);
                throw new Error(`服务器响应格式错误: ${parseError.message}`);
            }
        }

        // 轮询进度
        async function pollProgress(taskId) {
            const progressBar = document.getElementById('progressBar');
            const progressPercent = document.getElementById('progressPercent');
            const progressDetail = document.getElementById('progressDetail');
            const progressText = document.getElementById('progressText');
            const downloadArea = document.getElementById('downloadArea');
            const errorArea = document.getElementById('errorArea');
            const convertBtn = document.getElementById('convertBtn');

            try {
                const response = await fetch(`/progress/${taskId}`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                // 使用安全的JSON解析
                const data = await safeJsonParse(response);

                if (data.status === 'processing') {
                    // 更新进度条
                    const percentage = Math.round((data.current / data.total) * 100);
                    progressBar.style.width = percentage + '%';
                    progressPercent.textContent = percentage + '%';
                    progressDetail.textContent = `${data.current} / ${data.total}`;
                    
                    // 根据文件大小显示不同的提示
                    if (data.total > 100) {
                        progressText.textContent = '正在分批处理大文件...';
                    } else {
                        progressText.textContent = '正在转换...';
                    }

                    // 继续轮询
                    setTimeout(() => pollProgress(taskId), 500);
                } else if (data.status === 'completed') {
                    // 转换完成
                    progressBar.style.width = '100%';
                    progressPercent.textContent = '100%';
                    progressDetail.textContent = `${data.total} / ${data.total}`;
                    progressText.textContent = '转换完成！';

                    // 显示下载按钮
                    downloadArea.classList.remove('hidden');
                    document.getElementById('downloadBtn').href = `/download/${taskId}`;

                    convertBtn.disabled = false;
                    convertBtn.textContent = '开始转换';
                } else if (data.status === 'failed') {
                    // 转换失败
                    errorArea.classList.remove('hidden');
                    document.getElementById('errorMessage').textContent = data.error || '转换失败';
                    convertBtn.disabled = false;
                    convertBtn.textContent = '开始转换';
                }
            } catch (error) {
                console.error('进度轮询错误:', error);
                errorArea.classList.remove('hidden');
                document.getElementById('errorMessage').textContent = 
                    error.message.includes('JSON.parse') ? 
                    '服务器响应格式错误，请检查文件大小或重试' : 
                    error.message;
                convertBtn.disabled = false;
                convertBtn.textContent = '开始转换';
            }
        }
    </script>
</body>
</html>
