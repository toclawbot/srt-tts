name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (支持多架构)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate version tag
        id: version
        run: echo "tag=$(date +'%Y.%m')" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push v1 (智能拼接版本)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 同时构建 AMD64 和 ARM64
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/srt-tts:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/srt-tts:${{ steps.version.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/srt-tts:v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push v2 (分段生成版本)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.v2
          push: true
          # 同时构建 AMD64 和 ARM64
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/srt-tts:v2
            ${{ secrets.DOCKERHUB_USERNAME }}/srt-tts:${{ steps.version.outputs.tag }}-v2
          cache-from: type=gha
          cache-to: type=gha,mode=max
